services:
  homework-middleware:
    build: .
    container_name: homework-middleware
    volumes:
      - ./workspace:/workspace
    ports:
      - "10010:10010/tcp"  		# Ice
      - "10010:10010/udp"  		# Ice
      - "9090-9091:9090-9091/tcp"    	# Thrift
      - "50041:50041/tcp"  		# gRPC
      - "8080:8080/tcp"  # <--- To jest dla Nginxa
    tty: true